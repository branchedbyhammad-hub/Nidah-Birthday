<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Nidah</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      position: relative;
      padding: 20px;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 4rem;
      color: #fff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }

    .love-lines {
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: 30px;
      opacity: 0;
      animation: fadeIn 2s forwards;
      animation-delay: 1s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Heart animation */
    .hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: red;
      transform: rotate(45deg);
      animation: floatUp 5s linear infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: red;
      border-radius: 50%;
    }

    .heart::before {
      top: -10px;
      left: 0;
    }

    .heart::after {
      left: 10px;
      top: 0;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(45deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-800px) rotate(45deg);
        opacity: 0;
      }
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 3rem;
      }
      .love-lines {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2.2rem;
      }
      .love-lines {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div>
    <h1>Happy Birthday Nidah ❤️</h1>
    <div class="love-lines" id="love-lines"></div>
  </div>

  <div class="hearts" id="hearts"></div>

  <script>
    // Love lines animation
    const lines = [
      "You are the sunshine of my life ☀️",
      "Every moment with you is magic ✨",
      "I love you more than words can say ❤️",
      "You make my world brighter 🌸",
      "Forever yours, always and always 💌"
    ];

    const loveLinesDiv = document.getElementById('love-lines');
    let index = 0;

    function showNextLine() {
      loveLinesDiv.textContent = lines[index];
      index = (index + 1) % lines.length;
    }

    showNextLine();
    setInterval(showNextLine, 3000);

    // Heart animation
    const heartsDiv = document.getElementById('hearts');

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.style.left = Math.random() * 100 + '%';
      const size = 10 + Math.random() * 15;
      heart.style.width = heart.style.height = size + 'px';
      heart.style.animationDuration = 3 + Math.random() * 2 + 's';
      heartsDiv.appendChild(heart);

      setTimeout(() => {
        heartsDiv.removeChild(heart);
      }, 5000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
